<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>JSON Viewer</title>
<style>
body{
    background:#111;
    color:#0f0;
    font-family:monospace;
    padding:20px;
}
pre{
    white-space:pre-wrap;
    word-break:break-word;
}
</style>
</head>
<body>

<h2>JSON Yükleniyor...</h2>
<pre id="json">3 saniye bekleniyor...</pre>

<script>
setTimeout(() => {

    fetch("https://patronsports2.cfd/matches.php")
    .then(response => response.json())
    .then(data => {
        document.getElementById("json").textContent =
            JSON.stringify(data, null, 2);
    })
    .catch(err => {
        document.getElementById("json").textContent =
            "Hata oluştu: " + err;
    });

}, 3000);
</script>

</body>
</html>
